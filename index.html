<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web2App - Générateur APK</title>
    <style>
        /* ===== STYLES (version simplifiée mais fonctionnelle) ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 30px 20px;
        }
        .container { max-width: 800px; width: 100%; }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            border: 1px solid #e9edf2;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #1a2332;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        h1 small { font-size: 0.9rem; font-weight: 400; color: #6b7a8f; }
        .subtitle { color: #5e6f84; margin-bottom: 25px; font-size: 1.05rem; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1a2332;
            margin-bottom: 5px;
        }
        .form-group label .required { color: #e53e3e; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #dce1e8;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: border 0.2s;
            background: #fafcfe;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #6c8cff;
            box-shadow: 0 0 0 4px rgba(108,140,255,0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .btn-generate {
            width: 100%;
            padding: 15px;
            background: #1a2332;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 6px;
        }
        .btn-generate:hover { background: #2c3a4e; }
        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status-msg {
            margin-top: 16px;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 0.9rem;
            display: none;
        }
        .status-msg.loading {
            display: block;
            background: #ebf4ff;
            color: #1a56db;
            border: 1px solid #bdd3ff;
        }
        .status-msg.success {
            display: block;
            background: #e6f7ed;
            color: #0b6e41;
            border: 1px solid #b2dfc8;
        }
        .status-msg.error {
            display: block;
            background: #fde8e8;
            color: #b91c1c;
            border: 1px solid #f8c4c4;
        }
        .download-link {
            display: inline-block;
            margin-top: 8px;
            font-weight: 700;
            color: #1a56db;
            text-decoration: underline;
            cursor: pointer;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e9edf2;
            border-radius: 10px;
            margin-top: 12px;
            overflow: hidden;
            display: none;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #6c8cff, #1a56db);
            width: 0%;
            border-radius: 10px;
            transition: width 0.5s;
        }
        .icon-preview {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 4px;
        }
        .icon-preview img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #e9edf2;
        }
        @media (max-width: 540px) {
            .form-row { grid-template-columns: 1fr; }
            .card { padding: 20px 16px; }
            h1 { font-size: 1.5rem; flex-wrap: wrap; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>
            📱 Web2App
            <small>Générateur APK</small>
        </h1>
        <p class="subtitle">Transformez n'importe quelle page web en application Android</p>

        <form id="appForm">
            <!-- URL -->
            <div class="form-group">
                <label>URL du site web <span class="required">*</span></label>
                <input type="url" id="appUrl" value="https://demo.pwabuilder.com/" placeholder="https://mon-site.com" required />
            </div>

            <!-- Nom + Package ID -->
            <div class="form-row">
                <div class="form-group">
                    <label>Nom de l'application <span class="required">*</span></label>
                    <input type="text" id="appName" value="Ma Super App" placeholder="Mon App" required />
                </div>
                <div class="form-group">
                    <label>Package ID <span class="required">*</span></label>
                    <input type="text" id="packageId" value="com.monprenom.masuperapp" placeholder="com.example.app" required />
                </div>
            </div>

            <!-- Icône -->
            <div class="form-group">
                <label>URL de l'icône (optionnel)</label>
                <input type="url" id="iconUrl" value="https://cdn-icons-png.flaticon.com/512/5969/5969059.png" placeholder="https://exemple.com/icon.png" />
                <div class="icon-preview">
                    <img id="iconPreview" src="https://cdn-icons-png.flaticon.com/512/5969/5969059.png" alt="icône" />
                    <span style="font-size:0.8rem; color:#7a8a9e;">Aperçu</span>
                </div>
            </div>

            <!-- Version + Orientation -->
            <div class="form-row">
                <div class="form-group">
                    <label>Version</label>
                    <input type="text" id="appVersion" value="1.0.0" placeholder="1.0.0" />
                </div>
                <div class="form-group">
                    <label>Orientation</label>
                    <select id="orientation">
                        <option value="portrait">Portrait</option>
                        <option value="landscape">Paysage</option>
                        <option value="default">Automatique</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-generate" id="generateBtn">
                🚀 Générer et télécharger l'APK
            </button>
        </form>

        <!-- Barre de progression -->
        <div class="progress-bar" id="progressBar">
            <div class="fill" id="progressFill"></div>
        </div>

        <!-- Message de statut -->
        <div id="statusMessage" class="status-msg"></div>
    </div>
</div>

<script>
    (function() {
        'use strict';

        const form = document.getElementById('appForm');
        const appUrl = document.getElementById('appUrl');
        const appName = document.getElementById('appName');
        const packageId = document.getElementById('packageId');
        const iconUrl = document.getElementById('iconUrl');
        const iconPreview = document.getElementById('iconPreview');
        const orientation = document.getElementById('orientation');
        const generateBtn = document.getElementById('generateBtn');
        const statusMsg = document.getElementById('statusMessage');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');

        // ===== APERÇU ICÔNE =====
        iconUrl.addEventListener('input', function() {
            const val = this.value.trim();
            if (val) {
                iconPreview.src = val;
                iconPreview.style.display = 'block';
                iconPreview.onerror = function() { this.style.display = 'none'; };
            } else {
                iconPreview.style.display = 'none';
            }
        });

        // ===== VALIDATION URL =====
        function isValidUrl(string) {
            try {
                const url = new URL(string);
                return url.protocol === 'http:' || url.protocol === 'https:';
            } catch (_) {
                return false;
            }
        }

        // ===== AFFICHAGE STATUT =====
        function showStatus(message, type, isDownload = false) {
            statusMsg.innerHTML = message;
            statusMsg.className = 'status-msg ' + type;
            if (isDownload) {
                const link = statusMsg.querySelector('.download-link');
                if (link) {
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        const url = this.dataset.url;
                        if (url) {
                            window.location.href = url;
                        }
                    });
                }
            }
        }

        // ===== PROGRESSION =====
        function setProgress(percent) {
            progressBar.style.display = 'block';
            progressFill.style.width = percent + '%';
        }

        function resetProgress() {
            progressBar.style.display = 'none';
            progressFill.style.width = '0%';
        }

        // ===== SOUMISSION =====
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Validation
            if (!appUrl.value.trim() || !isValidUrl(appUrl.value.trim())) {
                showStatus('❌ Veuillez entrer une URL valide (http:// ou https://).', 'error');
                return;
            }
            if (!appName.value.trim()) {
                showStatus('❌ Veuillez entrer un nom pour l\'application.', 'error');
                return;
            }
            if (!packageId.value.trim()) {
                showStatus('❌ Veuillez entrer un Package ID (ex: com.monprenom.app).', 'error');
                return;
            }

            // Désactiver le bouton
            generateBtn.disabled = true;
            generateBtn.innerHTML = '⏳ Génération en cours...';
            showStatus('🔨 Construction de l\'APK en cours... Veuillez patienter.', 'loading');
            resetProgress();

            try {
                // ============================================================
                // 1. PRÉPARER LES DONNÉES POUR L'API PWA2APK
                // ============================================================
                const url = appUrl.value.trim();
                const name = appName.value.trim();
                const pkg = packageId.value.trim();
                const icon = iconUrl.value.trim() || 'https://cdn-icons-png.flaticon.com/512/5969/5969059.png';
                const version = appVersion.value.trim() || '1.0.0';
                const orient = orientation.value;

                // ============================================================
                // 2. APPEL À L'API PWA2APK (GRATUITE)
                //    Documentation : https://pwa2apk.com/api
                // ============================================================
                const response = await fetch('https://api.pwa2apk.com/build', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        url: url,
                        name: name,
                        package: pkg,
                        icon: icon,
                        version: version,
                        orientation: orient,
                        // Optionnel : vous pouvez ajouter une clé API si vous en avez une
                        // apiKey: 'votre_clé_ici'
                    })
                });

                // Simuler une progression pendant l'attente
                let progress = 0;
                const progressInterval = setInterval(() => {
                    progress = Math.min(progress + 5, 90);
                    setProgress(progress);
                }, 300);

                // Traiter la réponse
                const data = await response.json();

                clearInterval(progressInterval);
                setProgress(100);

                if (!response.ok) {
                    throw new Error(data.message || 'Erreur lors de la génération');
                }

                // ============================================================
                // 3. TÉLÉCHARGER L'APK GÉNÉRÉ
                // ============================================================
                if (data.downloadUrl) {
                    // Option 1 : Rediriger vers l'URL de téléchargement
                    // window.location.href = data.downloadUrl;

                    // Option 2 : Télécharger via un lien cliquable (plus sûr)
                    const apkName = name.replace(/\s+/g, '_') + '.apk';
                    showStatus(
                        '✅ APK généré avec succès !<br>' +
                        '<a href="#" class="download-link" data-url="' + data.downloadUrl + '">📥 Cliquez ici pour télécharger ' + apkName + '</a>',
                        'success',
                        true
                    );
                    generateBtn.innerHTML = '✅ APK prêt !';

                    // Téléchargement automatique (optionnel)
                    // window.open(data.downloadUrl, '_blank');

                } else if (data.apkUrl) {
                    // Certaines APIs utilisent 'apkUrl'
                    const apkName = name.replace(/\s+/g, '_') + '.apk';
                    showStatus(
                        '✅ APK généré avec succès !<br>' +
                        '<a href="#" class="download-link" data-url="' + data.apkUrl + '">📥 Télécharger ' + apkName + '</a>',
                        'success',
                        true
                    );
                    generateBtn.innerHTML = '✅ APK prêt !';
                } else {
                    throw new Error('URL de téléchargement non trouvée dans la réponse');
                }

            } catch (error) {
                console.error('Erreur:', error);
                showStatus('❌ ' + error.message, 'error');
                generateBtn.innerHTML = '🔄 Réessayer';
                resetProgress();
            } finally {
                generateBtn.disabled = false;
            }
        });

        // ===== INIT =====
        console.log('📱 Web2App prêt ! Utilisez une vraie API pour générer des APK.');

        // Petit message d'info sur l'API
        console.log('ℹ️ L\'API PWA2APK est gratuite mais peut avoir des limites.');
        console.log('💡 Si vous voulez votre propre API, utilisez Web2Droid x2y.');

    })();
</script>

</body>
</html>
